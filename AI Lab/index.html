<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Lab Tracker — CS23I1053</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0d0f17;
      --surface:   #141722;
      --card:      #1a1e2e;
      --card-hover:#1f2438;
      --border:    #2a2f4a;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --green:     #22d3a5;
      --green-dim: #16a37a;
      --text:      #e2e8f0;
      --muted:     #8892b0;
      --tag-bg:    #252b42;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ── HEADER ── */
    .header {
      max-width: 860px;
      margin: 0 auto 2.5rem;
      text-align: center;
    }
    .header .badge {
      display: inline-block;
      padding: .3rem .9rem;
      background: linear-gradient(135deg, #6c63ff22, #a78bfa22);
      border: 1px solid #6c63ff55;
      border-radius: 999px;
      font-size: .73rem;
      font-weight: 600;
      letter-spacing: .08em;
      color: var(--accent2);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .header h1 {
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .header p {
      margin-top: .6rem;
      color: var(--muted);
      font-size: .95rem;
    }

    /* ── PROGRESS BAR ── */
    .progress-section {
      max-width: 860px;
      margin: 0 auto 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem 1.8rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .progress-info { flex: 1; }
    .progress-info .label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: .5rem;
    }
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }
    .progress-count {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--green), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }
    .progress-count span { font-size: 1rem; font-weight: 400; color: var(--muted); }

    /* ── RESET BUTTON ── */
    .controls {
      max-width: 860px;
      margin: 0 auto 1.5rem;
      display: flex;
      justify-content: flex-end;
    }
    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: .8rem;
      padding: .4rem .9rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-reset:hover { border-color: #e5534b; color: #e5534b; }

    /* ── LABS GRID ── */
    .labs {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* ── LAB CARD ── */
    .lab-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color .25s, background .25s, transform .2s;
    }
    .lab-card:hover { border-color: #3a3f5e; background: var(--card-hover); transform: translateY(-1px); }
    .lab-card.done { border-color: #22d3a520; }
    .lab-card.done .lab-header { background: linear-gradient(90deg, #22d3a508, transparent); }

    .lab-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 1.4rem;
      cursor: pointer;
      user-select: none;
    }

    /* big checkbox */
    .lab-check {
      width: 26px; height: 26px;
      border-radius: 8px;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .25s;
      cursor: pointer;
    }
    .lab-check:hover { border-color: var(--green); }
    .lab-check.checked {
      background: var(--green);
      border-color: var(--green);
    }
    .lab-check.checked svg { opacity: 1; transform: scale(1); }
    .lab-check svg {
      width: 14px; height: 14px;
      stroke: #fff; stroke-width: 3;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      opacity: 0; transform: scale(.6);
      transition: all .2s;
    }

    .lab-number {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--tag-bg);
      padding: .2rem .6rem;
      border-radius: 6px;
    }

    .lab-meta { flex: 1; }
    .lab-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      transition: color .2s;
    }
    .lab-card.done .lab-title { color: var(--green); }
    .lab-subtitle {
      font-size: .78rem;
      color: var(--muted);
      margin-top: .15rem;
    }

    .lab-chips { display: flex; gap: .4rem; flex-wrap: wrap; margin-left: auto; }
    .chip {
      font-size: .67rem;
      font-weight: 600;
      padding: .2rem .55rem;
      border-radius: 999px;
      background: var(--tag-bg);
      color: var(--muted);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .chip.accent { background: #6c63ff18; color: var(--accent2); border-color: #6c63ff33; }

    .chevron {
      transition: transform .3s;
      color: var(--muted);
      flex-shrink: 0;
    }
    .lab-card.open .chevron { transform: rotate(180deg); }

    /* ── SUBTASKS ── */
    .subtasks {
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s cubic-bezier(.4,0,.2,1);
    }
    .lab-card.open .subtasks { max-height: 600px; }

    .subtask-list {
      padding: .3rem 1.4rem 1.2rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: .45rem;
    }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 1.4rem .7rem;
    }

    .subtask {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .55rem .8rem;
      border-radius: 10px;
      transition: background .2s;
      cursor: pointer;
    }
    .subtask:hover { background: var(--tag-bg); }

    .sub-check {
      width: 19px; height: 19px;
      border-radius: 5px;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .2s;
    }
    .subtask:hover .sub-check { border-color: var(--accent2); }
    .sub-check.checked { background: var(--accent); border-color: var(--accent); }
    .sub-check.checked svg { opacity: 1; transform: scale(1); }
    .sub-check svg {
      width: 10px; height: 10px;
      stroke: #fff; stroke-width: 3;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      opacity: 0; transform: scale(.5);
      transition: all .18s;
    }

    .subtask-name {
      font-size: .87rem;
      color: var(--text);
      transition: all .2s;
      font-family: 'Inter', monospace;
    }
    .subtask.checked .subtask-name {
      color: var(--muted);
      text-decoration: line-through;
    }

    /* ── CONFETTI TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: var(--card);
      border: 1px solid var(--green);
      color: var(--green);
      padding: .8rem 1.4rem;
      border-radius: 12px;
      font-size: .88rem;
      font-weight: 600;
      box-shadow: 0 4px 30px #22d3a520;
      transform: translateY(80px);
      opacity: 0;
      transition: all .4s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── ALL DONE MESSAGE ── */
    .all-done-banner {
      max-width: 860px;
      margin: 1.5rem auto 0;
      background: linear-gradient(135deg, #22d3a515, #6c63ff15);
      border: 1px solid #22d3a540;
      border-radius: 16px;
      padding: 1.2rem 1.8rem;
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--green);
      display: none;
    }
    .all-done-banner.show { display: block; }
  </style>
</head>
<body>

<div class="header">
  <div class="badge">🤖 Artificial Intelligence Lab</div>
  <h1>Lab Progress Tracker</h1>
  <p>CS23I1053 &nbsp;·&nbsp; Track your completed labs &amp; exercises</p>
</div>

<div class="progress-section">
  <div class="progress-info">
    <div class="label">Overall Completion</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>
  <div class="progress-count" id="progressCount">0 <span>/ 10 Labs</span></div>
</div>

<div class="controls">
  <button class="btn-reset" onclick="resetAll()">↺ Reset All</button>
</div>

<div class="labs" id="labsContainer"></div>

<div class="all-done-banner" id="allDoneBanner">
  🎉 Sab ho gaya! All 10 Labs Completed! You're on fire! 🔥
</div>

<div class="toast" id="toast"></div>

<script>
const LABS = [
  {
    id: "lab1",
    num: "Lab 01",
    title: "Graph Search & Optimization",
    subtitle: "Dijkstra · Bellman-Ford · TSP Brute Force",
    chips: ["Graphs", "Shortest Path"],
    files: ["dijkstra.py", "bellman_ford.py", "tsp_brute_force.py"]
  },
  {
    id: "lab2",
    num: "Lab 02",
    title: "Heuristic & Greedy Search",
    subtitle: "A* · Greedy Best-First · Fractional Knapsack",
    chips: ["Heuristic", "Greedy"],
    files: ["a_star_search.py", "greedy_best_first_search.py", "fractional_knapsack.py"]
  },
  {
    id: "lab3",
    num: "Lab 03",
    title: "Local Search & Advanced TSP",
    subtitle: "8-Queens Hill Climbing · TSP with A* + MST",
    chips: ["Local Search", "TSP"],
    files: ["eight_queens_hill_climbing.py", "tsp_a_star_mst_heuristic.py"]
  },
  {
    id: "lab4",
    num: "Lab 04",
    title: "8-Puzzle — Hill Climbing",
    subtitle: "Hill Climbing · Iterative Restarts",
    chips: ["Hill Climbing", "8-Puzzle"],
    files: ["eight_puzzle_hill_climbing.py", "eight_puzzle_iterative_hill_climbing.py"]
  },
  {
    id: "lab5",
    num: "Lab 05",
    title: "Genetic Algorithm — TSP",
    subtitle: "Evolutionary Approach to Traveling Salesman",
    chips: ["Genetic Algo", "Evolutionary"],
    files: ["genetic_algorithm_tsp.py"]
  },
  {
    id: "lab6",
    num: "Lab 06",
    title: "Game Playing — Tic Tac Toe",
    subtitle: "Minimax with Alpha-Beta Pruning",
    chips: ["Minimax", "Game Theory"],
    files: ["tic_tac_toe_minimax_alpha_beta.py"]
  },
  {
    id: "lab7",
    num: "Lab 07",
    title: "CSP — Crossword Puzzle",
    subtitle: "Backtracking + AC-3 Constraint Propagation",
    chips: ["CSP", "Backtracking"],
    files: ["crossword_csp_backtracking_ac3.py"]
  },
  {
    id: "lab8",
    num: "Lab 08",
    title: "CSP — Sudoku Solver",
    subtitle: "MRV + LCV Heuristics",
    chips: ["CSP", "Sudoku"],
    files: ["sudoku_solver_mrv_lcv.py"]
  },
  {
    id: "lab9",
    num: "Lab 09",
    title: "Logic Programming",
    subtitle: "Prolog-style Logic via Pytholog",
    chips: ["Prolog", "Logic AI"],
    files: ["prolog_logic_pytholog.py"]
  },
  {
    id: "lab10",
    num: "Lab 10",
    title: "Notebook Lab",
    subtitle: "Jupyter Notebook — Advanced AI Exercise",
    chips: ["Jupyter", "Notebook"],
    files: ["cs23i1053.ipynb"]
  }
];

// ── State management ──────────────────────────────────────────────────────────
function loadState() {
  try { return JSON.parse(localStorage.getItem('ailab_state') || '{}'); }
  catch { return {}; }
}
function saveState(state) {
  localStorage.setItem('ailab_state', JSON.stringify(state));
}

let state = loadState();   // { lab1: { done: true, files: { 'a.py': true } }, ... }

function getLabState(id)  { return state[id] || { done: false, files: {} }; }
function saveLabState(id, ls) { state[id] = ls; saveState(state); }

// ── Build UI ──────────────────────────────────────────────────────────────────
function checkSvg() {
  return `<svg viewBox="0 0 12 10"><polyline points="1,5 4,9 11,1"/></svg>`;
}

function buildCard(lab) {
  const ls = getLabState(lab.id);
  const allFilesChecked = lab.files.every(f => ls.files[f]);
  const doneClass = ls.done ? 'done' : '';

  const chips = lab.chips.map(c => `<span class="chip accent">${c}</span>`).join('');
  const labCheckClass = ls.done ? 'checked' : '';

  const subtasks = lab.files.map(f => {
    const fc = ls.files[f] ? 'checked' : '';
    return `
      <div class="subtask ${fc}" id="st_${lab.id}_${f.replace(/\./g,'_')}" onclick="toggleFile('${lab.id}','${f}')">
        <div class="sub-check ${fc}">${checkSvg()}</div>
        <span class="subtask-name">${f}</span>
      </div>`;
  }).join('');

  return `
  <div class="lab-card ${doneClass}" id="card_${lab.id}">
    <div class="lab-header" onclick="toggleOpen('${lab.id}')">
      <div class="lab-check ${labCheckClass}" id="lc_${lab.id}"
           onclick="event.stopPropagation(); toggleLab('${lab.id}')">${checkSvg()}</div>
      <span class="lab-number">${lab.num}</span>
      <div class="lab-meta">
        <div class="lab-title">${lab.title}</div>
        <div class="lab-subtitle">${lab.subtitle}</div>
      </div>
      <div class="lab-chips">${chips}</div>
      <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
    <div class="subtasks" id="sub_${lab.id}">
      <div class="divider"></div>
      <div class="subtask-list">${subtasks}</div>
    </div>
  </div>`;
}

function renderAll() {
  document.getElementById('labsContainer').innerHTML = LABS.map(buildCard).join('');
  updateProgress();
}

// ── Interactions ──────────────────────────────────────────────────────────────
function toggleOpen(id) {
  const card = document.getElementById(`card_${id}`);
  card.classList.toggle('open');
}

function toggleLab(id) {
  const lab  = LABS.find(l => l.id === id);
  const ls   = getLabState(id);
  const newDone = !ls.done;
  const newFiles = {};
  lab.files.forEach(f => newFiles[f] = newDone);
  saveLabState(id, { done: newDone, files: newFiles });

  // update card class
  const card = document.getElementById(`card_${id}`);
  card.classList.toggle('done', newDone);

  // update lab check
  const lc = document.getElementById(`lc_${id}`);
  lc.classList.toggle('checked', newDone);

  // update each subtask
  lab.files.forEach(f => {
    const key = `st_${id}_${f.replace(/\./g,'_')}`;
    const st  = document.getElementById(key);
    if (st) {
      st.classList.toggle('checked', newDone);
      st.querySelector('.sub-check').classList.toggle('checked', newDone);
    }
  });

  updateProgress();
  if (newDone) showToast(`✅ ${lab.title} marked done!`);
}

function toggleFile(labId, filename) {
  const lab  = LABS.find(l => l.id === labId);
  const ls   = getLabState(labId);
  ls.files[filename] = !ls.files[filename];

  const key = `st_${labId}_${filename.replace(/\./g,'_')}`;
  const st  = document.getElementById(key);
  const fc  = ls.files[filename];
  if (st) {
    st.classList.toggle('checked', fc);
    st.querySelector('.sub-check').classList.toggle('checked', fc);
  }

  // auto-check lab if all files done
  const allDone = lab.files.every(f => ls.files[f]);
  ls.done = allDone;
  saveLabState(labId, ls);

  const card = document.getElementById(`card_${labId}`);
  card.classList.toggle('done', allDone);
  document.getElementById(`lc_${labId}`).classList.toggle('checked', allDone);

  if (allDone) showToast(`✅ ${lab.title} marked done!`);
  updateProgress();
}

function updateProgress() {
  const done = LABS.filter(l => getLabState(l.id).done).length;
  const pct  = Math.round((done / LABS.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressCount').innerHTML = `${done} <span>/ ${LABS.length} Labs</span>`;

  const banner = document.getElementById('allDoneBanner');
  banner.classList.toggle('show', done === LABS.length);
}

function resetAll() {
  if (!confirm('Sab reset kar dein? All progress will be lost.')) return;
  state = {};
  saveState(state);
  renderAll();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
